# qwen-superpowers slash command. See brainstorm.toml for the {{args}} note.
description = "Execute a written plan one step at a time, checking after each."
prompt = """
Apply the Executing Plans procedure (canonical: skills/executing-plans.md).

1. Restate the NEXT single step. Do only that step.
2. Make the change, limited to the one file/concern it names.
3. Run that step's check; paste the output.
4. Green → mark done, go to next. Red → fix now; do NOT start the next step.
5. Re-read each step fresh; never batch steps.

Stuck after 2–3 tries on a step → stop and report. Treat any post-edit hook failure as a hard stop.

Plan (path or text): {{args}}
"""
